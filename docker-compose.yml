services:
  nginx:
    image: nginx:stable-alpine
    container_name: influence-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/gateway.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/proxy.conf:/etc/nginx/proxy.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - influnce-network
    restart: always

  backend:
    build: 
      context: ./backend
    container_name: influnce-backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env.production
    volumes:
      - /home/ubuntu/influenzoo_data/backend/uploads:/usr/src/app/uploads
    networks:
      - influnce-network
    restart: always

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=${VITE_API_URL:-https://influenzoo.com}
        - VITE_APP_NAME=${VITE_APP_NAME:-InfluenZoo}
    container_name: influnce-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    volumes:
      - /home/ubuntu/influenzoo_data/frontend/static:/usr/share/nginx/html/static
    networks:
      - influnce-network
    restart: always

networks:
  influnce-network:
    driver: bridge
