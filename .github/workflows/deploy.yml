name: Production Deployment (Docker)

on:
  push:
    branches:
      - production
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    env:
      APP_NAME: influnce
      DOMAIN: 3.111.1.192
      NODE_VERSION: "24" # Matching local version

    steps:
      - name: 🔐 Pre-Cleanup Permissions Fix & Setup
        run: |
          echo "Fixing permissions and ensuring persistent directories exist..."
          # Fix ownership and permissions for the workspace
          if [ -d "${{ github.workspace }}" ]; then
            sudo chown -R $USER:$USER ${{ github.workspace }} || true
            sudo chmod -R 777 ${{ github.workspace }} || true
          fi
          
          # Ensure persistent data directories exist outside of workspace
          sudo mkdir -p /home/ubuntu/influenzoo_data/backend/uploads
          sudo mkdir -p /home/ubuntu/influenzoo_data/frontend/static
          
          # Fix ownership for the 'node' user (UID 1000) used in the Docker containers
          # We use 777 to be absolutely sure permissions don't block uploads
          sudo chown -R 1000:1000 /home/ubuntu/influenzoo_data
          sudo chmod -R 777 /home/ubuntu/influenzoo_data
          echo "✅ Permissions and persistent directories ready."

      - name: 🛠️ Ensure System & Docker Environment
        run: |
          echo "Updating system and installing base utilities..."
          sudo DEBIAN_FRONTEND=noninteractive apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y curl git ca-certificates gnupg lsb-release wget unzip
          
          echo "Verifying Docker installation..."
          if ! command -v docker &> /dev/null; then
            echo "Installing Docker Engine..."
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose-v2 docker-buildx-plugin
            sudo systemctl start docker
            sudo systemctl enable docker
            echo "✅ Docker installed successfully."
          else
            echo "✅ Docker is already installed."
          fi
          
          echo "✅ Environment is ready."


      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          clean: true

      - name: ⚙️ Generate Backend .env
        working-directory: ./backend
        run: |
          echo "${{ secrets.PROD_BACKEND_ENV }}" > .env
          if [ ! -s .env ]; then
            echo "❌ ERROR: Backend .env is empty or not created!"
            exit 1
          fi
          echo "✅ Backend .env created"

      - name: ⚙️ Generate Frontend .env
        working-directory: ./frontend
        run: |
          echo "${{ secrets.PROD_FRONTEND_ENV }}" > .env
          if [ ! -s .env ]; then
            echo "❌ ERROR: Frontend .env is empty or not created!"
            exit 1
          fi
          # Source the .env file to export variables for the docker build command
          export $(grep -v '^#' .env | xargs)
          echo "✅ Frontend .env created"

      - name: 🚀 Build and Deploy with Docker Compose
        run: |
          # Stop host Nginx if it's running to free up Port 80
          sudo systemctl stop nginx || true
          sudo systemctl disable nginx || true
          
          # Pull variables from frontend .env if available
          if [ -f ./frontend/.env ]; then
            export $(grep -v '^#' ./frontend/.env | xargs)
          fi
          
          # Ensure VITE_API_URL is set to the public domain
          export VITE_API_URL="http://${{ env.DOMAIN }}"
          
          sudo -E docker compose down
          sudo -E docker compose up --build -d
          echo "✅ Containers started in detached mode"

      - name: 🩺 Check Deployment Health
        run: |
          echo "Waiting for services to stabilize..."
          sleep 20
          
          echo "Checking Gateway health..."
          if sudo docker ps | grep -q "influence-gateway"; then
            echo "✅ Gateway container is running"
          else
            echo "❌ Gateway container FAILED to start"
            sudo docker logs influence-gateway
            exit 1
          fi

          echo "Checking Backend health..."
          # Test internal connectivity to backend container
          if sudo docker ps | grep -q "influnce-backend"; then
            echo "✅ Backend container is running"
            # Try to curl the health endpoint if it exists
            BE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || echo "500")
            echo "Backend status code: $BE_STATUS"
          else
            echo "❌ Backend container FAILED to start"
            sudo docker logs influnce-backend
            exit 1
          fi

          echo "Checking Frontend health..."
          if sudo docker ps | grep -q "influnce-frontend"; then
            echo "✅ Frontend container is running"
            FE_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080 || echo "500")
            echo "Frontend status code: $FE_STATUS"
          else
            echo "❌ Frontend container FAILED to start"
            sudo docker logs influnce-frontend
            exit 1
          fi

      - name: 🧹 Cleanup Unused Docker Images
        if: always()
        run: |
          sudo docker image prune -f
          echo "✅ Cleanup completed"

      - name: 📢 Deployment Summary
        if: success()
        run: |
          echo "========================================="
          echo "✅ Deployment Successful for ${{ env.APP_NAME }}!"
          echo "========================================="
          sudo docker ps
