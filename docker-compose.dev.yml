services:
  backend:
    build: 
      context: ./backend
      target: development
    container_name: influnce-backend-dev
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/usr/src/app
      - backend_node_modules:/usr/src/app/node_modules
    command: npm run dev
    networks:
      - influnce-network
    restart: always

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: influnce-frontend-dev
    working_dir: /app
    ports:
      - "8080:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
    command: npm run dev
    depends_on:
      - backend
    networks:
      - influnce-network
    restart: always

networks:
  influnce-network:
    driver: bridge

volumes:
  backend_node_modules:
  frontend_node_modules:
