server {
    listen 80;
    server_name influenzoo.com www.influenzoo.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://influenzoo.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name influenzoo.com www.influenzoo.com;

    ssl_certificate /etc/letsencrypt/live/influenzoo.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/influenzoo.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50M;

    include /etc/nginx/proxy.conf;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
}
